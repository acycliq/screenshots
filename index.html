<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Type Zen Dashboard - TV Landscape</title>
    <style>
        :root {
            --bg-color: #000; 
            --sidebar-bg: #0a0a0a;
            --sidebar-item-hover: #161616;
            --sidebar-item-active: #222;
            --text-color: #eee;
            --accent-color: #00a8ff;
            --border-color: #1a1a1a;
            --count-text: #666;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 0.9rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #444;
        }

        .cell-list {
            flex: 1;
            overflow-y: auto;
        }

        .cell-item {
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            border-left: 3px solid transparent;
        }

        .cell-item:hover {
            background-color: var(--sidebar-item-hover);
        }

        .cell-item.active {
            background-color: var(--sidebar-item-active);
            border-left-color: var(--accent-color);
        }

        .cell-name {
            display: block;
            font-weight: 500;
            font-size: 0.95rem;
            color: #ccc;
        }

        .cell-counts {
            font-size: 0.8rem;
            color: var(--count-text);
            margin-top: 4px;
        }

        /* Main Display - Top/Bottom Split */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            overflow: hidden;
        }

        .split-view {
            flex: 1;
            display: flex;
            flex-direction: column; /* Vertical stacking */
        }

        .image-panel {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid #111;
        }

        .image-panel:last-child {
            border-bottom: none;
        }

        .panel-meta {
            position: absolute;
            top: 20px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
            pointer-events: none;
        }

        .label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 2px;
        }

        .count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            color: var(--accent-color);
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 2px;
        }

        .image-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease;
        }

        .loading img {
            opacity: 0;
        }

        /* Floating Cell Title Overlay */
        .cell-title-overlay {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            pointer-events: none;
        }

        .cell-title-overlay h2 {
            margin: 0;
            font-size: 2rem;
            font-weight: 300;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .index-indicator {
            font-family: monospace;
            color: #444;
            font-size: 1rem;
            margin-top: 5px;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Atlas Comparison</h1>
            </div>
            <div id="cellList" class="cell-list"></div>
        </aside>
        
        <main class="main-stage">
            <div class="split-view">
                <!-- TOP PANEL -->
                <div class="image-panel">
                    <div class="panel-meta">
                        <div class="label">With Rho G</div>
                        <div id="countWith" class="count"></div>
                    </div>
                    <div class="image-wrapper" id="wrapWith">
                        <img id="imgWith" src="blank.png">
                    </div>
                </div>
                
                <!-- BOTTOM PANEL -->
                <div class="image-panel">
                    <div class="panel-meta">
                        <div class="label">Without Rho G</div>
                        <div id="countWithout" class="count"></div>
                    </div>
                    <div class="image-wrapper" id="wrapWithout">
                        <img id="imgWithout" src="blank.png">
                    </div>
                </div>
            </div>

            <!-- Floating Title -->
            <div class="cell-title-overlay">
                <h2 id="currentCellName">---</h2>
                <div id="globalIndex" class="index-indicator"></div>
            </div>
        </main>
    </div>

    <script>
        let dashboardData = [];
        let currentIndex = -1;

        async function init() {
            try {
                const response = await fetch('/api/data');
                dashboardData = await response.json();
                renderList();
                if (dashboardData.length > 0) selectCell(0);
            } catch (error) {
                console.error(error);
            }
        }

        function renderList() {
            const listContainer = document.getElementById('cellList');
            listContainer.innerHTML = '';
            dashboardData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'cell-item';
                div.id = `item-${index}`;
                div.innerHTML = `
                    <span class="cell-name">${item.name}</span>
                    <span class="cell-counts">${item.with.count.toLocaleString()} | ${item.without.count.toLocaleString()}</span>
                `;
                div.onclick = () => selectCell(index);
                listContainer.appendChild(div);
            });
        }

        function selectCell(index) {
            if (index < 0 || index >= dashboardData.length) return;
            
            if (currentIndex !== -1) document.getElementById(`item-${currentIndex}`).classList.remove('active');
            
            currentIndex = index;
            const item = dashboardData[index];
            const activeEl = document.getElementById(`item-${index}`);
            activeEl.classList.add('active');
            activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            document.getElementById('currentCellName').textContent = item.name;
            document.getElementById('globalIndex').textContent = `INDEX: ${String(index + 1).padStart(2, '0')} / ${dashboardData.length}`;
            
            const imgWith = document.getElementById('imgWith');
            const imgWithout = document.getElementById('imgWithout');
            
            document.getElementById('wrapWith').classList.add('loading');
            document.getElementById('wrapWithout').classList.add('loading');

            imgWith.src = item.with.image;
            imgWithout.src = item.without.image;
            
            imgWith.onload = () => document.getElementById('wrapWith').classList.remove('loading');
            imgWithout.onload = () => document.getElementById('wrapWithout').classList.remove('loading');

            document.getElementById('countWith').textContent = item.with.count.toLocaleString();
            document.getElementById('countWithout').textContent = item.without.count.toLocaleString();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') { e.preventDefault(); selectCell(Math.min(currentIndex + 1, dashboardData.length - 1)); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); selectCell(Math.max(currentIndex - 1, 0)); }
        });

        init();
    </script>
</body>
</html>
