<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Type Zen Dashboard - TV Landscape</title>
    <style>
        :root {
            --bg-color: #000; 
            --sidebar-bg: #111;
            --sidebar-item-hover: #1a1a1a;
            --sidebar-item-active: #222;
            --text-color: #eee;
            --accent-color: #00ff88; /* Matching the green scrollbar vibe */
            --border-color: #222;
            --count-text: #888;
            --input-bg: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* --- Sidebar Overhaul --- */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-search {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-search input {
            width: 100%;
            padding: 8px 12px;
            background: var(--input-bg);
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
        }

        .sidebar-search input:focus {
            border-color: #555;
        }

        .cell-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .cell-item {
            display: flex;
            align-items: center;
            padding: 8px 15px;
            cursor: pointer;
            transition: background 0.1s;
            gap: 12px;
            border-left: 2px solid transparent;
        }

        .cell-item:hover {
            background-color: var(--sidebar-item-hover);
        }

        .cell-item.active {
            background-color: var(--sidebar-item-active);
            border-left-color: var(--accent-color);
        }

        .cell-color-icon {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .cell-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
        }

        .cell-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #bbb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
        }

        .cell-item.active .cell-name {
            color: #fff;
        }

        .cell-count-small {
            font-size: 0.75rem;
            color: var(--count-text);
            font-family: monospace;
            flex-shrink: 0;
        }

        .eye-icon {
            width: 16px;
            height: 16px;
            fill: #444;
            flex-shrink: 0;
        }

        .cell-item.active .eye-icon {
            fill: var(--accent-color);
        }

        /* --- Main Display (Top/Bottom) --- */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            overflow: hidden;
        }

        .split-view {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .image-panel {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid #111;
        }

        .panel-meta {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 5;
            pointer-events: none;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            color: var(--accent-color);
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 3px;
        }

        .image-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.2s ease;
        }

        .loading img { opacity: 0; }

        .cell-title-overlay {
            position: absolute;
            bottom: 20px;
            left: 25px;
            z-index: 10;
            pointer-events: none;
        }

        .cell-title-overlay h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 300;
            color: #fff;
        }

        .index-indicator {
            font-family: monospace;
            color: #333;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* --- Custom Scrollbar (from reference) --- */
        .cell-list::-webkit-scrollbar {
            width: 8px;
        }
        .cell-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .cell-list::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
            border: 2px solid var(--sidebar-bg);
        }

        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-search">
                <input type="text" id="filterInput" placeholder="Filter classes..." spellcheck="false">
            </div>
            <div id="cellList" class="cell-list"></div>
        </aside>
        
        <main class="main-stage">
            <div class="split-view">
                <div class="image-panel">
                    <div class="panel-meta">
                        <div class="label">With Rho G</div>
                        <div id="countWith" class="count"></div>
                    </div>
                    <div class="image-wrapper" id="wrapWith">
                        <img id="imgWith" src="blank.png">
                    </div>
                </div>
                
                <div class="image-panel">
                    <div class="panel-meta">
                        <div class="label">Without Rho G</div>
                        <div id="countWithout" class="count"></div>
                    </div>
                    <div class="image-wrapper" id="wrapWithout">
                        <img id="imgWithout" src="blank.png">
                    </div>
                </div>
            </div>

            <div class="cell-title-overlay">
                <h2 id="currentCellName">---</h2>
                <div id="globalIndex" class="index-indicator"></div>
            </div>
        </main>
    </div>

    <script>
        let dashboardData = [];
        let filteredData = [];
        let currentIndex = -1;

        const EYE_SVG = `<svg class="eye-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`;

        // Deterministic color based on name
        function getColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const h = Math.abs(hash % 360);
            return `hsl(${h}, 60%, 50%)`;
        }

        async function init() {
            try {
                const response = await fetch('/api/data');
                dashboardData = await response.json();
                filteredData = [...dashboardData];
                renderList();
                if (filteredData.length > 0) selectCell(0);
            } catch (error) {
                console.error(error);
            }
        }

        function renderList() {
            const listContainer = document.getElementById('cellList');
            listContainer.innerHTML = '';
            
            filteredData.forEach((item, index) => {
                const actualIndex = dashboardData.indexOf(item);
                const div = document.createElement('div');
                div.className = 'cell-item';
                div.id = `item-${actualIndex}`;
                
                div.innerHTML = `
                    <div class="cell-color-icon" style="background: ${item.color}"></div>
                    <div class="cell-info">
                        <span class="cell-name">${item.name}</span>
                        <span class="cell-count-small">${item.with.count.toLocaleString()}</span>
                    </div>
                    ${EYE_SVG}
                `;
                
                div.onclick = () => selectCell(actualIndex);
                listContainer.appendChild(div);
            });

            // Re-highlight if current cell is in filtered list
            if (currentIndex !== -1) {
                const currentEl = document.getElementById(`item-${currentIndex}`);
                if (currentEl) currentEl.classList.add('active');
            }
        }

        function selectCell(actualIndex) {
            if (actualIndex === -1) return;
            
            // Remove previous active state
            const prevActive = document.querySelector('.cell-item.active');
            if (prevActive) prevActive.classList.remove('active');
            
            currentIndex = actualIndex;
            const item = dashboardData[actualIndex];
            const activeEl = document.getElementById(`item-${actualIndex}`);
            
            if (activeEl) {
                activeEl.classList.add('active');
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            document.getElementById('currentCellName').textContent = item.name;
            document.getElementById('globalIndex').textContent = `INDEX: ${String(actualIndex + 1).padStart(2, '0')} / ${dashboardData.length}`;
            
            document.getElementById('wrapWith').classList.add('loading');
            document.getElementById('wrapWithout').classList.add('loading');

            document.getElementById('imgWith').src = item.with.image;
            document.getElementById('imgWithout').src = item.without.image;
            
            document.getElementById('imgWith').onload = () => document.getElementById('wrapWith').classList.remove('loading');
            document.getElementById('imgWithout').onload = () => document.getElementById('wrapWithout').classList.remove('loading');

            document.getElementById('countWith').textContent = item.with.count.toLocaleString();
            document.getElementById('countWithout').textContent = item.without.count.toLocaleString();
        }

        // Filter Logic
        document.getElementById('filterInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            filteredData = dashboardData.filter(item => 
                item.name.toLowerCase().includes(val)
            );
            renderList();
        };

        // Keyboard Nav (through visible items)
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            const currentFilteredIdx = filteredData.findIndex(item => dashboardData.indexOf(item) === currentIndex);
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                const next = filteredData[Math.min(currentFilteredIdx + 1, filteredData.length - 1)];
                if (next) selectCell(dashboardData.indexOf(next));
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                const prev = filteredData[Math.max(currentFilteredIdx - 1, 0)];
                if (prev) selectCell(dashboardData.indexOf(prev));
            }
        });

        init();
    </script>
</body>
</html>
